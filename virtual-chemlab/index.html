<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtual ChemLab</title>
    <!-- Google Fonts for modern typography -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Top Navigation Area -->
    <nav class="navbar">
        <div class="nav-brand">
            <div class="logo">
                <!-- Simple SVG flask logo -->
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M9 3H15M10 3V9L5 18C4.5 19 5 21 6.5 21H17.5C19 21 19.5 19 19 18L14 9V3" stroke="#ea580c"
                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                    <path d="M5.5 16H18.5" stroke="#ea580c" stroke-width="2" stroke-linecap="round" />
                </svg>
            </div>
            <h1><strong>Virtual</strong> ChemLab</h1>
        </div>
        <div class="nav-links">
            <a href="#" class="active">Experiments</a>
            <a href="#">Tutorials</a>
            <a href="#">Safety Guide</a>
        </div>
        <div class="nav-actions">
            <button class="icon-btn settings-btn" aria-label="Settings">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="3"></circle>
                    <path
                        d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z">
                    </path>
                </svg>
            </button>
            <button class="icon-btn help-btn" aria-label="Help">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"></circle>
                    <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path>
                    <line x1="12" y1="17" x2="12.01" y2="17"></line>
                </svg>
            </button>
            <div class="user-profile">
                <img src="https://api.dicebear.com/7.x/notionists/svg?seed=Felix&backgroundColor=ea580c"
                    alt="User Profile" class="avatar">
            </div>
        </div>
    </nav>

    <!-- Main Workspace -->
    <main class="dashboard">

        <!-- Left Controls Sidebar -->
        <aside class="left-panel">
            <div class="panel-header">
                <span class="experiment-id">EXPERIMENT 1.3</span>
                <h2>Reaction of Zinc Granules with Dilute Acids</h2>
            </div>

            <div class="control-group">
                <label>Select Acid Solution</label>
                <div class="button-list">
                    <button class="choice-btn active" data-acid="H2SO4">
                        <span class="droplet-icon">💧</span>
                        Dilute H₂SO₄
                    </button>
                    <button class="choice-btn" data-acid="HCl">
                        <span class="droplet-icon">💧</span>
                        HCl (Hydrochloric Acid)
                    </button>
                    <button class="choice-btn" data-acid="HNO3">
                        <span class="droplet-icon">💧</span>
                        HNO₃ (Nitric Acid)
                    </button>
                </div>
            </div>

            <div class="control-group">
                <label>Actions</label>
                <div class="button-list">
                    <button class="action-btn" id="btnAddZinc" onclick="addZinc()">
                        Add Zinc Granules
                        <span class="icon-right">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <path
                                    d="M4 14a2 2 0 1 0 0-4 2 2 0 0 0 0 4zm8 0a2 2 0 1 0 0-4 2 2 0 0 0 0 4zm8 0a2 2 0 1 0 0-4 2 2 0 0 0 0 4z" />
                            </svg>
                        </span>
                    </button>
                    <button class="action-btn" id="btnLightCandle" onclick="lightCandle()" disabled>
                        Light Candle
                        <span class="icon-right">🔥</span>
                    </button>
                </div>
            </div>

            <div class="tip-box">
                <p><em><strong>Tip:</strong> Observe the gas bubbles carefully. Bring the candle near the soap bubbles
                        to test for Hydrogen.</em></p>
            </div>
        </aside>

        <!-- Center Simulation Canvas -->
        <section class="center-panel">
            <div class="simulation-card">
                <div class="sim-header">
                    <div class="live-status">
                        <span class="recording-dot"></span> LIVE SIMULATION
                    </div>
                    <div class="molecule-badge" id="moleculeBadge">H₂</div>
                </div>

                <div class="sim-stage">
                    <!-- SVG Simulation Scene -->
                    <div class="apparatus-container">
                        <!-- Custom CSS/SVG based rendering of experiment -->
                        <div class="stand">
                            <div class="stand-base"></div>
                            <div class="stand-pole"></div>
                            <div class="stand-clamp"></div>
                        </div>

                        <!-- Test Tube -->
                        <div class="test-tube">
                            <div class="liquid" id="tubeLiquid"></div>
                            <div class="zinc-granules" id="zincGranules">
                                <!-- Granules added via JS -->
                            </div>
                            <div class="tube-bubbles" id="tubeBubbles"></div>
                            <div class="cork"></div>
                            <!-- Delivery tube connecting tube to trough -->
                            <div class="delivery-tube-horizontal"></div>
                            <div class="delivery-tube-vertical"></div>
                            <div class="delivery-tube-angle"></div>
                        </div>

                        <!-- Soap Trough -->
                        <div class="soap-trough">
                            <div class="soap-liquid"></div>
                            <div class="soap-bubbles" id="soapBubbles"></div>
                        </div>

                        <!-- Candle -->
                        <div class="candle-container" id="candleEl">
                            <div class="candle-stick"></div>
                            <div class="candle-flame"></div>
                        </div>

                        <!-- Pop Effect -->
                        <div class="pop-effect" id="popEffect"></div>
                    </div>
                </div>

                <div class="sim-footer">
                    <div class="sim-tabs">
                        <button class="active">TEMPERATURE</button>
                        <button>PRESSURE</button>
                    </div>
                    <div class="reaction-status" id="reactionStatus">Reaction Inactive</div>
                </div>
            </div>

            <div class="grand-pop-overlay" id="grandPopOverlay">POP!</div>
        </section>

        <!-- Right Lab Notebook Sidebar -->
        <aside class="right-panel">
            <div class="notebook-header">
                <h3>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#ea580c" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round" style="margin-right: 8px;">
                        <path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20" />
                    </svg>
                    Lab Notebook
                </h3>
            </div>

            <div class="notebook-logs" id="notebookLogs">
                <!-- Logs are added here dynamically -->

                <!-- Pending placeholder -->
                <div class="log-card pending-log" id="pendingLog">
                    Next observation pending...
                </div>
            </div>

            <div class="notebook-footer">
                <button class="btn-primary">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        style="margin-right:8px;">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                        <path d="M14 2v6h6" />
                        <path d="M12 18v-6" />
                        <path d="M9 15h6" />
                    </svg>
                    Export Findings
                </button>
                <button class="btn-secondary" onclick="resetExperiment()">Reset Experiment</button>
            </div>
        </aside>

    </main>

    <!-- Audio elements -->
    <audio id="popSound"
        src="https://cdn.pixabay.com/download/audio/2022/03/10/audio_51bf93abef.mp3?filename=pop-39222.mp3"
        preload="auto"></audio>

    <script src="app.js"></script>
</body>

</html>
